#
# Transforms configuration for ODIN_app_for_splunk v2.2.0
#
# Classification lookup definitions for search-time enrichment.
# Log source mapping lookup for Phase 2 host role classification.
#

[odin_classify_services]
filename = odin_classify_services.csv
case_sensitive_match = false
match_type = WILDCARD(service_pattern)

[odin_classify_ports]
filename = odin_classify_ports.csv
case_sensitive_match = false

[odin_classify_packages]
filename = odin_classify_packages.csv
case_sensitive_match = false
match_type = WILDCARD(package_pattern)

[odin_log_sources]
filename = odin_log_sources.csv
case_sensitive_match = false

[odin_recommended_tas]
filename = odin_recommended_tas.csv
case_sensitive_match = false
