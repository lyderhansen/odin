#
# Saved searches for ODIN_app_for_splunk v2.2.0
#
# Phase 2: Host role classification and log source identification.
# These searches aggregate per-event enumeration data into host-level
# role assignments and TA deployment recommendations.
#

[ODIN - Host Inventory]
description = Aggregates discovery signals per host into roles, log sources, and recommended TAs. Outputs odin_host_inventory.csv for dashboards and deployment planning.
search = index=odin_discovery sourcetype=odin:enumeration \
  (type=service OR type=port OR type=package) \
| eval signal_type=type \
| eval signal_value=case( \
    type="service", service_name, \
    type="port", listen_port."/".transport, \
    type="package", package_name \
  ) \
| dedup hostname, signal_type, signal_value \
| lookup odin_log_sources signal_type, signal_value \
| where isnotnull(host_role) \
| stats \
    values(host_role) AS host_roles, \
    values(log_source) AS log_sources, \
    values(recommended_ta) AS recommended_tas, \
    dc(log_source) AS log_source_count, \
    latest(_time) AS last_seen \
  by hostname \
| eval host_roles=mvjoin(host_roles, ",") \
| eval log_sources=mvjoin(log_sources, ",") \
| eval recommended_tas=mvjoin(recommended_tas, ",") \
| outputlookup create_empty=false odin_host_inventory.csv
dispatch.earliest_time = -45d
dispatch.latest_time = now
cron_schedule = 5 1 * * *
enableSched = 1
is_visible = true

[ODIN - Log Source Details]
description = Detailed per-host breakdown of detected roles, log sources, and collection recommendations. Outputs odin_log_source_details.csv for drill-down and dashboards.
search = index=odin_discovery sourcetype=odin:enumeration \
  (type=service OR type=port OR type=package) \
| eval signal_type=type \
| eval signal_value=case( \
    type="service", service_name, \
    type="port", listen_port."/".transport, \
    type="package", package_name \
  ) \
| dedup hostname, signal_type, signal_value \
| lookup odin_log_sources signal_type, signal_value \
| where isnotnull(host_role) \
| stats \
    values(signal_type) AS detected_by, \
    values(signal_value) AS signals, \
    values(sourcetype) AS sourcetypes, \
    values(log_path) AS log_paths, \
    values(recommended_ta) AS recommended_ta, \
    values(description) AS descriptions \
  by hostname, host_role, log_source \
| outputlookup create_empty=false odin_log_source_details.csv
dispatch.earliest_time = -45d
dispatch.latest_time = now
cron_schedule = 10 1 * * *
enableSched = 1
is_visible = true

[ODIN - TA Deployment Matrix]
description = Actionable summary of which TAs to deploy to which hosts. Use for Deployment Server planning and serverclass generation.
search = | inputlookup odin_host_inventory.csv \
| makemv delim="," recommended_tas \
| mvexpand recommended_tas \
| where recommended_tas!="none" \
| stats values(hostname) AS hosts, dc(hostname) AS host_count by recommended_tas \
| rename recommended_tas AS recommended_ta \
| lookup odin_recommended_tas recommended_ta \
    OUTPUT official_name, splunkbase_id, splunkbase_url, status, notes \
| rename recommended_ta AS ta_name \
| sort - host_count
dispatch.earliest_time = -45d
dispatch.latest_time = now
cron_schedule = 15 1 * * *
enableSched = 1
is_visible = true

[alert_odin_truncated_events]
action.email = 0
action.script = 0
alert.digest_mode = 1
alert.severity = 3
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule =
description = Alerts when TA-ODIN emits type=truncated events, indicating ODIN_MAX_EVENTS was hit on one or more hosts and enumeration data is being dropped. Enable this search and set a cron_schedule (e.g., "0 */6 * * *" for every 6 hours) to be notified. Fleet-wide truncation usually means ODIN_MAX_EVENTS needs raising for a subset of hosts.
disabled = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = smart
display.page.search.tab = statistics
enableSched = 0
quantity = 0
relation = greater than
search = index=odin_discovery sourcetype=odin:enumeration type=truncated | stats count as truncated_count by hostname, run_id | sort - truncated_count

[alert_odin_module_timeouts]
action.email = 0
action.script = 0
alert.digest_mode = 1
alert.severity = 3
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule =
description = Alerts when TA-ODIN emits type=odin_error exit_code=124 (module timeout - ODIN_MODULE_TIMEOUT exceeded, usually 90s). Fleet-wide timeout patterns indicate a hung module on a specific OS/distro or a systemctl/dpkg/registry lock. Enable this search and set cron_schedule to catch problems early. Consider tuning ODIN_MODULE_TIMEOUT upward on affected host classes.
disabled = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = smart
display.page.search.tab = statistics
enableSched = 0
quantity = 0
relation = greater than
search = index=odin_discovery sourcetype=odin:enumeration type=odin_error exit_code=124 | stats count as timeout_count, values(module) as modules_timing_out by hostname | sort - timeout_count

[alert_odin_fleet_scan_success_rate_below_slo]
action.email = 0
action.script = 0
alert.digest_mode = 1
alert.severity = 3
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule =
description = Alerts when fleet-wide TA-ODIN scan-success rate (modules_failed=0) drops below 95% over the last 24 hours. Enable by setting cron_schedule (e.g., "0 */6 * * *") and disabled = 0. Operator should set the success-rate threshold per-org after PROD-02 pilot baseline (95% is a starting point, not a hard SLO). See DOCS/RUNBOOK.md for response procedure.
disabled = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
search = index=odin_discovery sourcetype=odin:enumeration type=odin_complete earliest=-24h \
| stats count(eval(modules_failed=0)) AS successful, count AS total by hostname \
| eval success_rate=successful/total \
| where success_rate < 0.95 \
| stats count AS failing_hosts \
| where failing_hosts > 0
