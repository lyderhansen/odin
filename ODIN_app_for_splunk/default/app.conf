#
# Splunk app configuration for ODIN_app_for_splunk v2.2.0
# Indexer / Search Head app for ODIN endpoint enumeration data
#
# Deploy to: Indexers (for indexes.conf) and Search Heads (for lookups, props, transforms)
# Do NOT deploy to Universal Forwarders - use TA-ODIN for forwarders.
#

[install]
is_configured = 0
build = 1

[ui]
is_visible = true
label = ODIN Endpoint Visibility

[launcher]
author = Your Organization
description = ODIN indexer and search head app. Provides the odin_discovery index, classification lookups, and search-time enrichment for TA-ODIN enumeration data. Deploy TA-ODIN to forwarders separately.
version = 1.0.0

[package]
id = ODIN_app_for_splunk
