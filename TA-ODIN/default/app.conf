#
# Splunk app configuration for TA-ODIN v2.2.0
# Lightweight forwarder app for endpoint enumeration
#
# Deploy to: Universal Forwarders via Deployment Server
# Pair with: ODIN_app_for_splunk on indexers/search heads
#

[install]
is_configured = 0
build = 3

[ui]
is_visible = false
label = TA-ODIN Endpoint Enumeration

[launcher]
author = Your Organization
description = Technology Add-on for ODIN - Runs enumeration scripts on endpoints to discover services, ports, packages, scheduled tasks, processes, and mounts. Reports metadata only. Pair with ODIN_app_for_splunk on indexers/search heads for index definition and classification lookups.
version = 1.0.0

[package]
id = TA-ODIN
