#
# Splunk app configuration for TA-ODIN v1.0.1
# Lightweight forwarder app for endpoint enumeration
#
# Deploy to: Universal Forwarders via Deployment Server
# Pair with: ODIN_app_for_splunk on indexers/search heads
#

[install]
is_configured = 0
build = 3

[ui]
is_visible = false
label = TA-ODIN Endpoint Enumeration

[launcher]
author = Lyder Hansen
description = TA-ODIN forwarder app - enumerates services, ports, packages, scheduled tasks, processes, and mounts on Linux and Windows endpoints. Reports metadata only, never log content. Pairs with ODIN_app_for_splunk on indexers and search heads.
license = Apache-2.0
version = 1.0.1

[package]
id = TA-ODIN
check_for_updates = False
