#
# Props configuration for TA-ODIN Discovery
#
# Defines how discovery events are parsed and indexed
#

[odin:discovery]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = timestamp=
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE = 10000

# Extract all key=value pairs automatically
KV_MODE = auto

# Field extractions
EXTRACT-odin_fields = timestamp=(?<timestamp>[^,]+),\s*hostname=(?<hostname>[^,]+),\s*os=(?<os>[^,]+),\s*detection_type=(?<detection_type>[^,]+),\s*category=(?<category>[^,]+)

# Aliases for CIM compliance
FIELDALIAS-dest = hostname AS dest
FIELDALIAS-dvc = hostname AS dvc
