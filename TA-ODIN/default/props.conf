#
# Props configuration for TA-ODIN v2.0
#
# Defines how enumeration events are parsed and indexed.
# The odin:discovery sourcetype is retained for backward compatibility.
#

[odin:enumeration]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TIME_PREFIX = timestamp=
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE = 10000

# Extract all key=value pairs automatically (space-separated format)
KV_MODE = auto

# Aliases for CIM compliance
FIELDALIAS-dest = hostname AS dest
FIELDALIAS-dvc = hostname AS dvc

# Search-time classification lookups
LOOKUP-classify_services = odin_classify_services service_name AS service_name OUTPUT category AS service_category, subcategory AS service_subcategory, vendor AS service_vendor, role AS service_role, description AS service_description
LOOKUP-classify_ports = odin_classify_ports listen_port AS port, transport AS transport OUTPUT expected_service, category AS port_category, description AS port_description
LOOKUP-classify_packages = odin_classify_packages package_name AS package_pattern OUTPUT category AS package_category, vendor AS package_vendor, role AS package_role, description AS package_description

# Legacy sourcetype (backward compatibility with v1 data)
[odin:discovery]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = timestamp=
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE = 10000
KV_MODE = auto
EXTRACT-odin_fields = timestamp=(?<timestamp>[^,]+),\s*hostname=(?<hostname>[^,]+),\s*os=(?<os>[^,]+),\s*detection_type=(?<detection_type>[^,]+),\s*category=(?<category>[^,]+)
FIELDALIAS-dest = hostname AS dest
FIELDALIAS-dvc = hostname AS dvc
