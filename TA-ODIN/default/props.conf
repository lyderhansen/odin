#
# Props configuration for TA-ODIN v2.1.0 (Forwarder)
#
# Minimal parsing config for Universal Forwarders.
# Full search-time props (KV_MODE, CIM aliases, lookups) live in ODIN_app_for_splunk.
#

[odin:enumeration]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TIME_PREFIX = timestamp=
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE = 10000
