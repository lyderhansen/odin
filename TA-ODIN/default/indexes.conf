#
# Index configuration for TA-ODIN Discovery
#
# IMPORTANT: This file should be deployed to your indexers, not to forwarders.
# The discovery data from forwarders will be sent to this index.
#
# Retention options - uncomment the one you need:
#

[odin_discovery]
homePath = $SPLUNK_DB/odin_discovery/db
coldPath = $SPLUNK_DB/odin_discovery/colddb
thawedPath = $SPLUNK_DB/odin_discovery/thaweddb

# 1 year retention (default)
frozenTimePeriodInSecs = 31536000

# Alternative retention periods - uncomment one if needed:
# 6 months
#frozenTimePeriodInSecs = 15768000

# 2 years
#frozenTimePeriodInSecs = 63072000

# 3 years
#frozenTimePeriodInSecs = 94608000

# Max size in MB (adjust based on environment size)
maxTotalDataSizeMB = 1024
