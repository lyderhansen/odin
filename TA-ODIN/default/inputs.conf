#
# Input configuration for TA-ODIN Discovery
#
# By default, the discovery script runs once when deployed.
# To change frequency, copy this file to local/inputs.conf and modify.
#

# Linux discovery script
[script://./bin/odin.sh]
disabled = false
index = odin_discovery
sourcetype = odin:discovery
# Run once at startup, then every 30 days (2592000 seconds)
# For one-time only, set interval = -1
interval = 2592000

# Windows discovery script
[script://.\bin\odin.ps1]
disabled = false
index = odin_discovery
sourcetype = odin:discovery
# Run once at startup, then every 30 days (2592000 seconds)
# For one-time only, set interval = -1
interval = 2592000
