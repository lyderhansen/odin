#
# Input configuration for TA-ODIN v2.0
#
# By default, the enumeration script runs once when deployed, then every 30 days.
# To change frequency, copy this file to local/inputs.conf and modify.
#

# Linux enumeration script
[script://./bin/odin.sh]
disabled = false
index = odin_discovery
sourcetype = odin:enumeration
# Run once at startup, then every 30 days (2592000 seconds)
# For one-time only, set interval = -1
interval = 2592000
# Full enumeration timeout (seconds)
timeout = 120

# Windows enumeration script (invoked via .path wrapper — see RESEARCH §8)
[script://.\bin\odin.path]
disabled = false
index = odin_discovery
sourcetype = odin:enumeration
# Run once at startup, then every 30 days (2592000 seconds)
# For one-time only, set interval = -1
interval = 2592000
timeout = 120
